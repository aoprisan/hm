<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realms of Valor — a fairy-tale strategy game</title>
    <style>
      :root {
        --frame: #5b3a1a;
        --frame-dark: #3a2410;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a120a;
        color: #f2e4c0;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #0c0a06;
        box-shadow: 0 0 0 6px var(--frame-dark), 0 0 0 10px var(--frame),
          0 18px 50px rgba(0, 0, 0, 0.7);
        max-width: 100%;
        max-height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        letter-spacing: 2px;
        color: #d9b878;
        text-shadow: 0 2px 4px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <div id="loading">Summoning the realm…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
