<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Realms of Valor — a fairy-tale strategy game</title>
    <meta
      name="description"
      content="A fairy-tale, turn-based strategy game inspired by Heroes of Might & Magic II. Mobile-first, plays in portrait or landscape."
    />
    <meta name="theme-color" content="#1a120a" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Realms" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0c0a06;
        color: #f2e4c0;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        /* Stop pull-to-refresh / rubber-banding from interrupting play. */
        overscroll-behavior: none;
        /* No long-press callout / selection on the canvas. */
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* The canvas fills the entire viewport; the renderer sizes it to the
         usable area (respecting safe-area insets via the body padding). */
      #app {
        position: fixed;
        inset: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #0c0a06;
        /* The canvas handles its own taps; suppress browser scroll/zoom. */
        touch-action: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        letter-spacing: 2px;
        color: #d9b878;
        text-shadow: 0 2px 4px #000;
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <div id="loading">Summoning the realm…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
