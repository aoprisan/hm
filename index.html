<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Realms of Valor — a fairy-tale strategy game</title>
    <meta
      name="description"
      content="A fairy-tale, turn-based strategy game inspired by Heroes of Might & Magic II."
    />
    <meta name="theme-color" content="#5b3a1a" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Realms" />
    <style>
      :root {
        --frame: #5b3a1a;
        --frame-dark: #3a2410;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a120a;
        color: #f2e4c0;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        /* Stop pull-to-refresh / rubber-banding from interrupting play. */
        overscroll-behavior: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Keep the board clear of notches and rounded corners. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #0c0a06;
        box-shadow: 0 0 0 6px var(--frame-dark), 0 0 0 10px var(--frame),
          0 18px 50px rgba(0, 0, 0, 0.7);
        max-width: 100%;
        max-height: 100%;
        /* The canvas handles its own taps; suppress browser scroll/zoom. */
        touch-action: none;
      }
      /* Thinner ornamental frame on small screens to reclaim play area. */
      @media (max-width: 700px), (max-height: 500px) {
        canvas {
          box-shadow: 0 0 0 3px var(--frame-dark), 0 0 0 5px var(--frame),
            0 6px 18px rgba(0, 0, 0, 0.7);
        }
      }
      /* Landscape game: nudge phone users to rotate when held upright. */
      #rotate {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 32px;
        text-align: center;
        background: #1a120a;
        color: #d9b878;
        z-index: 10;
      }
      #rotate .glyph {
        font-size: 56px;
        animation: rotate-hint 2.2s ease-in-out infinite;
      }
      #rotate p {
        margin: 0;
        font-size: 18px;
        letter-spacing: 1px;
        text-shadow: 0 2px 4px #000;
      }
      @keyframes rotate-hint {
        0%, 40% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
      @media (orientation: portrait) and (max-width: 850px) {
        #rotate { display: flex; }
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        letter-spacing: 2px;
        color: #d9b878;
        text-shadow: 0 2px 4px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <div id="loading">Summoning the realm…</div>
    <div id="rotate">
      <div class="glyph">📱</div>
      <p>Rotate your device to landscape to play.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
