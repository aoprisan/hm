name: Deploy PWA to GitHub Pages

# Builds both games from this single branch into one GitHub Pages site:
#   - a chooser landing page (root index.html) -> site root  (https://<user>.github.io/<repo>/)
#   - the classic game (classic/)              -> /classic/  (.../classic/)
#   - the RPG adventure (rpg/)                 -> /rpg/       (.../rpg/)
# Both apps live in this repo, so no cross-branch checkout is needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs so a
# deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Build classic game (/classic/)
        working-directory: classic
        run: |
          npm ci
          npm run build

      - name: Build RPG adventure (/rpg/)
        working-directory: rpg
        run: |
          npm ci
          npm run build
        env:
          # Both games share one origin, so namespace the RPG save key so it never
          # collides with the classic save. VITE_PWA_TAG distinguishes the installed
          # PWA name/icon.
          VITE_SAVE_SUFFIX: "-rpg"
          VITE_PWA_TAG: " (RPG)"

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp index.html site/
          # Tombstone worker that retires the stale root-scoped service worker
          # left over from the old single-app deploy (see sw.js).
          cp sw.js site/
          mkdir -p site/classic && cp -r classic/dist/. site/classic/
          mkdir -p site/rpg && cp -r rpg/dist/. site/rpg/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
