name: Deploy PWA to GitHub Pages

# Builds two versions into one GitHub Pages site:
#   - the stable game (main)        -> site root          (https://<user>.github.io/<repo>/)
#   - the RPG test build (preview)  -> /preview/ subpath  (https://<user>.github.io/<repo>/preview/)
# Because Pages serves a single artifact, every run rebuilds BOTH refs so the two
# stay live together — pushing to either branch never clobbers the other.
on:
  push:
    branches: [main, claude/game-direction-rpg-o0mybq]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs so a
# deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Checkout preview (RPG branch)
        uses: actions/checkout@v4
        with:
          ref: claude/game-direction-rpg-o0mybq
          path: preview

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Build stable game (site root)
        working-directory: stable
        run: |
          npm ci
          npm run build

      - name: Build RPG preview (/preview/)
        working-directory: preview
        run: |
          npm ci
          npm run build
        env:
          # Namespaces the localStorage save key so the preview never touches a
          # real save (and tags the installed PWA name).
          VITE_SAVE_SUFFIX: "-preview"

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r stable/dist/. site/
          mkdir -p site/preview
          cp -r preview/dist/. site/preview/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # A push to the RPG branch can't deploy to Pages directly — the github-pages
  # environment only allows the default branch. So once the preview build above
  # succeeds, kick this same workflow on main; that run rebuilds both refs
  # (checking out the RPG branch's latest commit for /preview/) and publishes,
  # auto-refreshing the live preview. The build dependency means a broken preview
  # never gets published.
  publish-preview:
    needs: build
    if: github.event_name == 'push' && github.ref_name == 'claude/game-direction-rpg-o0mybq'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger publish on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "${{ github.repository }}"

  deploy:
    needs: build
    # Publishes only from main (push/merge) or an explicit/dispatched run. RPG-branch
    # pushes skip this and instead trigger a dispatched main run via publish-preview.
    if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
